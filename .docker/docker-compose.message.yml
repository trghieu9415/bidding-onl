services:
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: bid_rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./.volumes/rabbitmq_data:/var/lib/rabbitmq
