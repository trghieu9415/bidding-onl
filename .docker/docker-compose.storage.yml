services:
  postgres_db:
    image: postgres:17-alpine
    container_name: bid_postgres_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: bidding_db
    ports:
      - "5432:5432"
    volumes:
      - ./.volumes/pg_data:/var/lib/postgresql/data # Chú ý thêm ../ vì file yml đang nằm trong thư mục con

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: bid_minio_s3_simulator
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ADMIN}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./.volumes/minio_data:/data
    command: server /data --console-address ":9001"
